<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark panel background, full-bleed with rounded corners -->
  <rect width="32" height="32" rx="6" ry="6" fill="#0E1C20"/>
  <!-- Outer diamond: 13×13 square rotated 45°, rounded corners, violet stroke -->
  <rect x="9.5" y="9.5" width="13" height="13" rx="2.5" ry="2.5"
        fill="none" stroke="#9B8CFF" stroke-width="2"
        transform="rotate(45 16 16)"/>
  <!-- Inner diamond: 5.5×5.5 solid violet fill -->
  <rect x="13.25" y="13.25" width="5.5" height="5.5" rx="0.5" ry="0.5"
        fill="#9B8CFF"
        transform="rotate(45 16 16)"/>
</svg>

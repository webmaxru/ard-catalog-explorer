name: Provision infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:
    inputs:
      customDomain:
        description: "Custom domain to bind (blank to skip). Create the Cloudflare CNAME first."
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    name: Deploy Bicep
    env:
      RESOURCE_GROUP: rg-ard-explorer
      LOCATION: westeurope
      SWA_NAME: ard-catalog-explorer
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        uses: azure/cli@v2
        with:
          inlineScript: az group create -n "$RESOURCE_GROUP" -l "$LOCATION" -o none

      - name: Deploy Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              -g "$RESOURCE_GROUP" \
              -f infra/main.bicep \
              -p name="$SWA_NAME" location="$LOCATION" sku=Free customDomain="${{ github.event.inputs.customDomain }}" \
              -o table
